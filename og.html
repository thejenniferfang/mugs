<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  @font-face {
    font-family: "Hand of Jen";
    src: url("fonts/hand-of-jen.ttf") format("truetype");
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  .card {
    width: 1200px;
    height: 630px;
    background: #fbfaf8;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 72px;
    font-family: "Hand of Jen", sans-serif;
    color: #111;
  }
  .card img { height: 440px; width: auto; object-fit: contain; }
  .title { font-size: 104px; line-height: 1; letter-spacing: -0.01em; }
  .sub { font-size: 36px; color: #8f8f8f; margin-top: 22px; }
  .by { font-size: 30px; color: #8f8f8f; margin-top: 10px; }
</style>
</head>
<body>
  <div class="card">
    <img src="cutouts/heath/large-mug.png" alt="Heath mug" />
    <div class="text">
      <div class="title">Mug&nbsp;Shelf</div>
      <div class="sub">a personal index of good mugs</div>
      <div class="by">by Jennifer Fang</div>
    </div>
  </div>
</body>
</html>
